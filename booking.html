<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Consultation | Astronomia</title>

<style>
body{
background:#0c0c12;
color:white;
font-family:'Segoe UI',sans-serif;
}

.form-box{
max-width:700px;
margin:100px auto;
padding:50px;
background:#111117;
border-radius:18px;
border:1px solid rgba(212,175,55,0.2);
box-shadow:0 20px 60px rgba(212,175,55,0.15);
}

.form-box h2{
text-align:center;
color:#d4af37;
margin-bottom:40px;
}

.form-box input,
.form-box select,
.form-box textarea{
width:100%;
padding:14px;
margin-bottom:18px;
background:#0b0b0f;
border:1px solid rgba(212,175,55,0.2);
border-radius:10px;
color:white;
font-size:14px;
}

.submit-btn{
width:100%;
padding:15px;
background:#d4af37;
color:black;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="form-box">
<h2>Book Your Consultation</h2>

<form id="bookingForm">

<input type="text" name="name" placeholder="Full Name" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<input type="email" name="email" placeholder="Email Address" required>

<label>Date of Birth</label>
<input type="date" name="dob" required>

<label>Time of Birth</label>
<input type="time" name="tob" required>

<input type="text" name="place" placeholder="Place of Birth" required>

<label>Type of Consultation</label>
<select name="service" required>
<option value="">Select Service</option>
<option>Astrology Consultation</option>
<option>Vastu Consultation (Home)</option>
<option>Vastu Consultation (Plot)</option>
<option>Industrial Vastu Visit</option>
<option>New Kundali Creation</option>
<option>Gemstone Recommendation</option>
<option>Gemstone Purchase Consultation</option>
</select>

<textarea name="message" placeholder="Describe Your Concern"></textarea>

<button type="submit" class="submit-btn">Submit Booking</button>

</form>
</div>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e){
e.preventDefault();

var form = this;

var message = 
"*New Consultation Booking - Astronomia*\n\n" +
"Name: " + form.name.value + "\n" +
"Phone: " + form.phone.value + "\n" +
"Email: " + form.email.value + "\n\n" +
"Date of Birth: " + form.dob.value + "\n" +
"Time of Birth: " + form.tob.value + "\n" +
"Place of Birth: " + form.place.value + "\n\n" +
"Service: " + form.service.value + "\n\n" +
"Concern: " + form.message.value;

var whatsappNumber = "919850454549";

var url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");

alert("Your booking details are ready to be sent on WhatsApp. Kindly press SEND to confirm your consultation.");
});
</script>

</body>
</html>
