<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Consultation | Astronomia</title>

<style>
body{
background:#0c0c12;
color:white;
font-family: 'Segoe UI', sans-serif;
}

.form-box{
max-width:650px;
margin:120px auto;
padding:50px;
background:#111117;
border-radius:18px;
border:1px solid rgba(212,175,55,0.2);
box-shadow:0 20px 60px rgba(212,175,55,0.15);
}

.form-box h2{
text-align:center;
color:#d4af37;
margin-bottom:40px;
letter-spacing:2px;
}

.form-box input,
.form-box textarea{
width:100%;
padding:15px;
margin-bottom:20px;
background:#0b0b0f;
border:1px solid rgba(212,175,55,0.2);
border-radius:10px;
color:white;
font-size:15px;
}

.form-box input:focus,
.form-box textarea:focus{
outline:none;
border:1px solid #d4af37;
}

.submit-btn{
width:100%;
padding:15px;
background:#d4af37;
color:black;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.submit-btn:hover{
background:#b8962f;
}
</style>
</head>

<body>

<div class="form-box">
<h2>Book Your Consultation</h2>

<form id="bookingForm">

<input type="text" name="Name" placeholder="Full Name" required>
<input type="tel" name="Phone" placeholder="Phone Number" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="text" name="service" placeholder="Service Required" required>
<textarea name="Concern" placeholder="Describe Your Concern"></textarea>

<button type="submit" class="submit-btn">Submit Booking</button>

</form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("vWUKW_m2GBVlS2yGo");
})();

document.getElementById("bookingForm").addEventListener("submit", function(e){
e.preventDefault();

var form = this;

emailjs.send("service_698j2qc","template_bdfz1nc",{
name: form.Name.value,
email: form.email.value,
phone: form.Phone.value,
service: form.service.value,
message: form.Concern.value
})
.then(function(){

alert("Booking submitted successfully. Please check your email.");

// Redirect to WhatsApp
window.location.href = "https://wa.me/919850454549?text=Hello%20Astronomia,%20I%20have%20submitted%20a%20booking%20request.";

form.reset();

}, function(error){
alert("Failed to send booking. Please try again.");
});
});
</script>

</body>
</html>
